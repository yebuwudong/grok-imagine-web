<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0B0F1A" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0B0F1A" />
  <title>Grok Imagine</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/dexie@4.0.1/dist/dexie.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['ui-sans-serif','system-ui','-apple-system','Segoe UI','Roboto','PingFang SC','Microsoft YaHei','Helvetica Neue','Arial']
          }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overscroll-behavior: none; }
    body { min-height: 100vh; min-height: -webkit-fill-available; }

    body { background: #ffffff; color: #0f172a; }
    html.dark body { background: #0B0F1A; color: #E5E7EB; }

    .glass {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(148,163,184,0.28);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    html.dark .glass {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .btn-gradient { background: linear-gradient(135deg, #00E5FF, #C084FC); color: #0b0f1a; }
    .btn-gradient:hover { filter: saturate(1.05) brightness(1.02); }

    .spinner { animation: spin 1.2s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #results { columns: 1; column-gap: 1rem; padding: 0.25rem; }
    @media (min-width: 640px){ #results{ columns: 2; } }
    @media (min-width: 1024px){ #results{ columns: 3; } }
    @media (min-width: 1440px){ #results{ columns: 4; } }

    .card {
      break-inside: avoid;
      display: inline-block;
      width: 100%;
      margin-bottom: 1rem;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 20px 60px rgba(15,23,42,0.12); }
    html.dark .card:hover { box-shadow: 0 20px 70px rgba(0,0,0,0.45); }

    .media-wrap {
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(148,163,184,0.12);
    }
    html.dark .media-wrap { background: rgba(255,255,255,0.06); }

    .overlay {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, rgba(2,6,23,0.82), rgba(2,6,23,0));
      padding: 14px;
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }
    .card:hover .overlay, .card.touched .overlay { opacity: 1; pointer-events: auto; }
    .multi-select-mode .overlay { opacity: 0 !important; pointer-events: none !important; }

    .select-checkbox { opacity: 0; pointer-events: none; transition: opacity .2s ease; }
    .multi-select-mode .select-checkbox { opacity: 1; pointer-events: auto; }

    #selectionBar {
      position: fixed;
      left: 12px; right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom, 0));
      z-index: 40;
      transform: translateY(130%);
      transition: transform .25s ease;
    }
    #selectionBar.show { transform: translateY(0); }

    #generationProgress {
      position: fixed;
      left: 12px; right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom, 0));
      z-index: 50;
      transform: translateY(130%);
      transition: transform .25s ease;
    }
    #generationProgress.show { transform: translateY(0); }

    .config-modal {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,0.55);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #previewGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .preview-item {
      border-radius: 12px;
      overflow: hidden;
      background: rgba(148,163,184,0.12);
      border: 1px solid rgba(148,163,184,0.26);
      aspect-ratio: 1/1;
    }
    html.dark .preview-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }

    .video-container video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .video-progress {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 12px;
      z-index: 25;
      border-radius: 14px;
      padding: 10px 12px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .video-progress.show { display: flex; }
    .video-progress .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }
    .video-progress .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }
    .video-progress .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00E5FF, #C084FC);
      transition: width 0.3s ease;
    }

    .page-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 1024px) {
      .page-grid {
        grid-template-columns: 420px 1fr;
        align-items: start;
      }
    }

    .panel {
      padding: 0;
      border: none;
      background: transparent;
      border-radius: 0;
    }

    .field {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,0.26);
      background: rgba(255,255,255,0.55);
      outline: none;
    }
    html.dark .field {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #E5E7EB;
    }
    .field:focus {
      box-shadow: 0 0 0 3px rgba(34,211,238,0.25);
      border-color: rgba(34,211,238,0.4);
    }
    textarea.field { resize: none; }

    .soft-btn {
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,0.26);
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-weight: 700;
    }
    html.dark .soft-btn {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #E5E7EB;
    }
    .soft-btn:hover { filter: brightness(1.02); }

    .danger-btn {
      padding: 10px 14px;
      border-radius: 14px;
      background: #DC2626;
      color: #fff;
      font-weight: 800;
    }
    .danger-btn:hover { background: #B91C1C; }
  </style>
</head>

<body class="text-slate-900 dark:text-gray-100">
  <div class="max-w-[1400px] mx-auto px-4 pt-5 pb-3">
    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl btn-gradient flex items-center justify-center shadow-sm">
          <i class="fas fa-wand-magic-sparkles"></i>
        </div>
        <div>
          <div class="text-xl font-extrabold tracking-tight">Grok Imagine</div>
          <div class="text-xs text-slate-500 dark:text-gray-400">图像 / 编辑 / 变体 / 视频</div>
        </div>
      </div>

      <div class="flex items-center gap-2 flex-wrap justify-end">
        <button id="openConfig" class="soft-btn">
          <i class="fas fa-gear mr-2"></i>配置
        </button>
        <button id="themeToggle" class="soft-btn">
          <i id="themeIcon" class="fas fa-circle-half-stroke mr-2"></i><span id="themeText">跟随系统</span>
        </button>
        <button id="clearHistory" class="danger-btn">
          <i class="fas fa-trash mr-2"></i>清除历史
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-[1400px] mx-auto px-4 pb-4">
    <div class="page-grid">
      <section class="panel">
        <div class="flex items-center justify-between mb-3">
          <div class="font-extrabold text-base">生成设置</div>
          <div class="text-xs text-slate-500 dark:text-gray-400">Ctrl/⌘ + Enter 生成</div>
        </div>

        <div class="space-y-3">
          <div>
            <label class="text-sm font-semibold mb-2 block">模型</label>
            <select id="model" class="field">
              <option value="grok-imagine-1.0" selected>grok-imagine-1.0（图像生成 / 变体）</option>
              <option value="grok-imagine-1.0-fast">grok-imagine-1.0-fast（图像生成 / 变体·快）</option>
              <option value="grok-imagine-1.0-edit">grok-imagine-1.0-edit（图像编辑）</option>
              <option value="grok-imagine-1.0-video">grok-imagine-1.0-video（视频生成）</option>
            </select>
          </div>

          <div>
            <label class="text-sm font-semibold mb-2 block">提示词</label>
            <textarea id="prompt" rows="6" maxlength="1000" placeholder="输入详细描述..." class="field"></textarea>
            <div class="flex items-center justify-between mt-2 text-xs text-slate-500 dark:text-gray-400">
              <span>已用 <span id="charCount">0</span> / 1000</span>
              <span>Esc 停止</span>
            </div>
          </div>

          <div>
            <label id="referenceLabel" class="text-sm font-semibold mb-2 block">参考图（可选）</label>
            <input type="file" id="inputImage" accept="image/*" multiple
              class="block w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-xl file:bg-cyan-300 file:text-slate-900 file:font-extrabold file:border-0" />

            <div id="previewContainer" class="mt-3 hidden">
              <div class="p-3 border border-slate-200/70 dark:border-white/10 rounded-xl bg-white/30 dark:bg-white/5">
                <div class="flex items-center justify-between">
                  <div class="text-sm font-bold">预览</div>
                  <div class="text-xs text-slate-500 dark:text-gray-400">已上传 <span id="imageCount">0</span> 张</div>
                </div>
                <div id="previewGrid"></div>
              </div>
              <button id="clearImage" class="mt-2 danger-btn">清除参考图</button>
            </div>
          </div>

          <div>
            <div id="imageParams" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div class="sm:col-span-2">
                <label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 mb-1">画幅比例</label>
                <select id="imageSize" class="field">
                  <option value="1024x1024">1:1（方图）</option>
                  <option value="1024x1792" selected>9:16（竖图）</option>
                  <option value="1792x1024">16:9（横图）</option>
                  <option value="720x1280">9:16（竖图·小）</option>
                  <option value="1280x720">16:9（横图·小）</option>
                </select>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 mb-1">response_format</label>
                <select id="responseFormat" class="field">
                  <option value="url">url</option>
                  <option value="b64_json" selected>b64_json</option>
                </select>
              </div>

              <div id="strengthParam" class="hidden">
                <label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 mb-1">strength</label>
                <select id="strength" class="field">
                  <option value="0.3">0.3</option>
                  <option value="0.5">0.5</option>
                  <option value="0.75" selected>0.75</option>
                  <option value="0.9">0.9</option>
                </select>
              </div>
            </div>

            <div id="videoParams" class="grid grid-cols-1 sm:grid-cols-2 gap-3 hidden">
              <div class="sm:col-span-2">
                <label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 mb-1">画幅比例</label>
                <select id="videoSize" class="field">
                  <option value="1024x1024">1:1（方图）</option>
                  <option value="1024x1792" selected>9:16（竖屏）</option>
                  <option value="1792x1024">16:9（横屏）</option>
                  <option value="720x1280">9:16（竖屏·小）</option>
                  <option value="1280x720">16:9（横屏·小）</option>
                </select>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 mb-1">seconds</label>
                <select id="videoSeconds" class="field">
                  <option value="6" selected>6</option>
                  <option value="10">10</option>
                  <option value="15">15</option>
                  <option value="20">20</option>
                  <option value="25">25</option>
                  <option value="30">30</option>
                </select>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 mb-1">quality</label>
                <select id="videoQuality" class="field">
                  <option value="standard">standard</option>
                  <option value="high" selected>high</option>
                </select>
              </div>
            </div>
          </div>

          <button id="generateBtn" class="w-full py-4 btn-gradient rounded-2xl font-extrabold text-lg">
            <i class="fas fa-magic mr-2"></i>生成
          </button>
        </div>
      </section>

      <section class="panel">
        <div class="flex items-center justify-between mb-3">
          <div class="font-extrabold text-base">结果</div>
          <div class="text-xs text-slate-500 dark:text-gray-400">双击卡片进入多选</div>
        </div>
        <div id="results"></div>
        <div id="empty" class="text-center py-20 text-slate-500 dark:text-gray-500">
          <i class="fas fa-sparkles text-5xl mb-4 opacity-20"></i>
          <p class="text-base">结果将显示在这里</p>
        </div>
      </section>
    </div>
  </div>

  <div id="selectionBar" class="hidden">
    <div class="glass rounded-2xl p-3 flex items-center justify-between gap-3">
      <div class="font-semibold">已选中 <span id="selectedCount">0</span> 个</div>
      <div class="flex gap-2 flex-wrap justify-end">
        <button id="selectAll" class="soft-btn">全选</button>
        <button id="downloadSelected" class="px-4 py-2 btn-gradient rounded-xl text-sm font-extrabold">
          <i class="fas fa-download mr-1"></i>下载
        </button>
        <button id="cancelSelection" class="soft-btn">取消</button>
      </div>
    </div>
  </div>

  <div id="generationProgress">
    <div class="glass rounded-2xl p-3 flex items-center justify-center gap-3 flex-wrap">
      <i class="fas fa-spinner spinner text-xl"></i>
      <p id="generationProgressText" class="font-semibold">生成中...</p>
      <span id="generationCounter" class="text-xs px-3 py-1 rounded-full bg-white/50 dark:bg-white/5 border border-slate-200/70 dark:border-white/10">已生成 0 个</span>
      <span id="generationTimer" class="text-xs px-3 py-1 rounded-full bg-white/50 dark:bg-white/5 border border-slate-200/70 dark:border-white/10">总耗时 0s</span>
      <button id="stopGenerate" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-semibold">
        <i class="fas fa-stop mr-1"></i>停止
      </button>
    </div>
  </div>

  <div id="error" class="fixed bottom-20 left-1/2 -translate-x-1/2 hidden z-50 max-w-[90vw]">
    <div class="bg-red-900/90 rounded-2xl px-5 py-3 text-base shadow-2xl text-white">
      <i class="fas fa-exclamation-triangle mr-2"></i> <span id="errorText"></span>
    </div>
  </div>

  <div id="configModal" class="config-modal hidden">
    <div class="glass p-6 w-full max-w-md mx-4 rounded-2xl">
      <div class="flex items-center justify-between mb-4">
        <div class="text-lg font-extrabold">API 配置</div>
        <button id="closeConfig" class="soft-btn"><i class="fas fa-xmark"></i></button>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">API Base URL</label>
        <input id="configBase" type="url" placeholder="http://localhost:8000" class="field" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">API Key（可选）</label>
        <input id="configKey" type="password" placeholder="Bearer token（可留空）" class="field" />
      </div>

      <div class="mb-5">
        <label class="block text-sm font-semibold mb-2">历史记录 Key（可选）</label>
        <input id="configHistoryKey" type="text" placeholder="grok_imagine_history" class="field" />
      </div>

      <div class="flex gap-2">
        <button id="saveConfig" class="flex-1 py-3 btn-gradient rounded-xl font-extrabold">保存</button>
        <button id="cancelConfig" class="flex-1 py-3 soft-btn">取消</button>
      </div>
    </div>
  </div>

  <script>
  'use strict';

  const MAX_PROMPT_LENGTH = 1000;
  const FIXED_IMAGE_N = 2;
  const MAX_CONCURRENCY = 3;
  const MIN_BYTES = 50 * 1024;

  // ── PERF 1: 预编译所有正则，避免每次调用重建 RegExp 对象 ──────────────────
  const RE_CODE_BLOCKS      = /```[\s\S]*?```/g;
  const RE_MD_IMG           = /!\[[^\]]*]\((https?:\/\/[^)\s]+)\)/i;
  const RE_HTTP_URL         = /https?:\/\/[^\s<>"{}|\\^`]*/i;
  const RE_REL_IMG          = /\/[^\s<>"{}|\\^`]*\.(png|jpg|jpeg|webp|gif)/i;
  const RE_DATA_MIME        = /^data:([^;,]+)/;
  const RE_URL_STRIP_START  = /^["'(<[]+/;
  const RE_URL_STRIP_END    = /[\s"'>)\],.]+$/;
  const RE_FILENAME_UNSAFE  = /[<>:"/\\|?*]/g;
  const RE_QUERY_HASH       = /[?#].*/;
  const RE_PROMPT_UNSAFE    = /[^a-zA-Z0-9\u4e00-\u9fa5]/g;
  const RE_UNDERSCORES      = /_+/g;
  const RE_TRIM_UNDERSCORES = /^_+|_+$/g;
  const RE_EXT_SUFFIX       = /\.[^/.]+$/;

  const db = new Dexie('GrokImagineDB');
  db.version(1).stores({ history: '++id, url, isVideo, prompt, timestamp' });

  let videoObserver;

  const Config = {
    storageKey: 'grok_imagine_config',
    defaults: { base: '', key: '', historyKey: 'grok_imagine_history' },
    load() {
      const params = new URLSearchParams(location.search);
      const fromUrl = {
        base: params.get('base') || '',
        key: params.get('key') || '',
        historyKey: params.get('historyKey') || this.defaults.historyKey
      };
      if (fromUrl.base) { this.save(fromUrl); return fromUrl; }
      try {
        const saved = localStorage.getItem(this.storageKey);
        if (saved) return { ...this.defaults, ...JSON.parse(saved) };
      } catch (_) {}
      return { ...this.defaults };
    },
    save(config) { try { localStorage.setItem(this.storageKey, JSON.stringify(config)); } catch (_) {} },
    isValid(config) { return !!(config.base && config.base.trim()); }
  };
  let config = Config.load();

  const Theme = {
    storageKey: 'grok_imagine_theme',
    mode: 'system',
    mql: null,
    load() {
      try {
        const v = localStorage.getItem(this.storageKey);
        if (v === 'system' || v === 'dark' || v === 'light') this.mode = v;
      } catch (_) {}
    },
    save() { try { localStorage.setItem(this.storageKey, this.mode); } catch (_) {} },
    systemPrefersDark() { return !!(this.mql && this.mql.matches); },
    appliedIsDark() {
      if (this.mode === 'dark') return true;
      if (this.mode === 'light') return false;
      return this.systemPrefersDark();
    },
    apply() {
      const isDark = this.appliedIsDark();
      document.documentElement.classList.toggle('dark', isDark);
      const metas = Array.from(document.querySelectorAll('meta[name="theme-color"]'));
      metas.forEach(m => m.setAttribute('content', isDark ? '#0B0F1A' : '#ffffff'));
      elements.themeText.textContent = (this.mode === 'system') ? '跟随系统' : (this.mode === 'dark' ? '深色' : '浅色');
      elements.themeIcon.className = 'fas mr-2 ' + (
        this.mode === 'system' ? 'fa-circle-half-stroke' :
        this.mode === 'dark' ? 'fa-moon' : 'fa-sun'
      );
    },
    cycle() {
      this.mode = (this.mode === 'system') ? 'dark' : (this.mode === 'dark' ? 'light' : 'system');
      this.save();
      this.apply();
    },
    init() {
      this.mql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
      this.load();
      this.apply();
      if (this.mql) {
        const handler = () => { if (this.mode === 'system') this.apply(); };
        if (this.mql.addEventListener) this.mql.addEventListener('change', handler);
        else if (this.mql.addListener) this.mql.addListener(handler);
      }
    }
  };

  const elements = {
    model: document.getElementById('model'),
    prompt: document.getElementById('prompt'),
    charCount: document.getElementById('charCount'),
    inputImage: document.getElementById('inputImage'),
    previewContainer: document.getElementById('previewContainer'),
    previewGrid: document.getElementById('previewGrid'),
    imageCount: document.getElementById('imageCount'),
    clearImage: document.getElementById('clearImage'),
    referenceLabel: document.getElementById('referenceLabel'),

    imageParams: document.getElementById('imageParams'),
    imageSize: document.getElementById('imageSize'),
    responseFormat: document.getElementById('responseFormat'),
    strengthParam: document.getElementById('strengthParam'),
    strength: document.getElementById('strength'),

    videoParams: document.getElementById('videoParams'),
    videoSize: document.getElementById('videoSize'),
    videoSeconds: document.getElementById('videoSeconds'),
    videoQuality: document.getElementById('videoQuality'),

    generateBtn: document.getElementById('generateBtn'),
    results: document.getElementById('results'),
    empty: document.getElementById('empty'),

    generationProgress: document.getElementById('generationProgress'),

  function base64BytesLen(b64) {
    if (!b64 || typeof b64 !== 'string') return 0;
    const s = b64.startsWith('data:') ? (b64.split(',')[1] || '') : b64;
    const padding = (s.endsWith('==') ? 2 : (s.endsWith('=') ? 1 : 0));
    return Math.max(0, Math.floor(s.length * 3 / 4) - padding);
  }

  async function urlBytesLen(url, signal) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    try {
      const res = await fetch(url, { mode: 'cors', cache: 'no-store', signal: signal || ctrl.signal });
      if (!res.ok) return 0;
      const blob = await res.blob();
      return blob.size || 0;
    } catch {
      return 0;
    } finally {
      clearTimeout(t);
    }
  }

  function extractFilenameFromUrl(url) {
    if (!url || typeof url !== 'string') return null;
    if (url.startsWith('data:')) return null;
    try {
      const u = new URL(url);
      // PERF 1: RE_QUERY_HASH 预编译，避免重建
      let filename = u.pathname.replace(/\/$/, '').split('/').pop();
      if (filename && filename.includes('.')) {
        filename = filename.replace(RE_QUERY_HASH, '');
        try { filename = decodeURIComponent(filename); } catch (_) {}
        filename = filename.replace(RE_FILENAME_UNSAFE, '_');
        return filename;
      }
    } catch (_) {}
    return null;
  }

  function getExtFromDataUrl(url) {
    if (!url || !url.startsWith('data:')) return 'png';
    // PERF 1: RE_DATA_MIME 预编译
    const m = url.match(RE_DATA_MIME);
    if (!m) return 'png';
    const mime = m[1].toLowerCase();
    if (mime.includes('jpeg') || mime.includes('jpg')) return 'jpg';
    if (mime.includes('webp')) return 'webp';
    if (mime.includes('gif')) return 'gif';
    return 'png';
  }

  function generateFilename(prompt, index, ext = 'png') {
    const random = Math.random().toString(36).slice(2, 8);
    let safe = '';
    if (prompt) {
      // PERF 1: RE_PROMPT_UNSAFE / RE_UNDERSCORES / RE_TRIM_UNDERSCORES 预编译
      safe = prompt.replace(RE_PROMPT_UNSAFE, '_').slice(0, 20);
      safe = safe.replace(RE_UNDERSCORES, '_').replace(RE_TRIM_UNDERSCORES, '');
    }
    return safe ? `grok_${safe}_${index}_${random}.${ext}` : `grok_${Date.now()}_${index}_${random}.${ext}`;
  }

  async function downloadFile(url, prompt, isVideo) {
    if (!url) return Atoms.showError('下载链接为空');

    let filename = extractFilenameFromUrl(url);
    if (!filename) {
      const ext = isVideo ? 'mp4' : (url.startsWith('data:') ? getExtFromDataUrl(url) : 'png');
      filename = generateFilename(prompt, 1, ext);
    }

    if (url.startsWith('data:')) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      return;
    }

    try {
      const res = await fetch(url, { mode: 'cors', cache: 'force-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 2000);
    } catch (_) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  }

  async function downloadSelectedAsZip() {
    const cards = Array.from(document.querySelectorAll('.card'));
    const selected = cards.filter(c => c.querySelector('.select-checkbox')?.checked);
    if (selected.length === 0) return Atoms.showError('请先选择要下载的文件');

    const original = elements.downloadSelected.innerHTML;
    elements.downloadSelected.innerHTML = '<i class="fas fa-spinner spinner mr-1"></i> 打包中...';
    elements.downloadSelected.disabled = true;

    const zip = new JSZip();
    const folder = zip.folder('grok_downloads_' + Date.now());
    let ok = 0, fail = 0;

    try {
      await Promise.all(selected.map(async (card, idx) => {
        const url = card.dataset.url;
        const prompt = card.dataset.prompt || '';
        const isVideo = card.dataset.isVideo === 'true';
        if (!url) { fail++; return; }

        let filename = extractFilenameFromUrl(url);
        if (!filename) {
          const ext = isVideo ? 'mp4' : (url.startsWith('data:') ? getExtFromDataUrl(url) : 'png');
          filename = generateFilename(prompt, idx + 1, ext);
        } else {
          // PERF 1: RE_EXT_SUFFIX 预编译
          const ext = isVideo ? 'mp4' : (filename.split('.').pop() || 'png');
          const base = filename.replace(RE_EXT_SUFFIX, '');
          filename = `${base}_${idx + 1}.${ext}`;
        }

        try {
          const res = await fetch(url, { mode: 'cors', cache: 'force-cache' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const blob = await res.blob();
          folder.file(filename, blob);
          ok++;
        } catch (e) {
          folder.file(filename.replace(RE_EXT_SUFFIX, '') + '_link.txt', `url: ${url}\nprompt: ${prompt}\nerror: ${e.message}`);
          fail++;
        }
      }));

      if (ok === 0) return Atoms.showError('所有文件下载失败');

      const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
      const zipUrl = URL.createObjectURL(content);
      const a = document.createElement('a');
      a.href = zipUrl;
      a.download = `grok_selected_${ok}files_${Date.now()}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(zipUrl), 2000);
    } finally {
      elements.downloadSelected.innerHTML = original;
      elements.downloadSelected.disabled = false;
    }
  }

    if (multiSelectMode) return;

  elements.selectAll.addEventListener('click', () => {

  // ── PERF 7: cleanUrl / normalizeUrl 提升为模块级函数，
  //    避免 extractUrl 每次调用都重建两个内部闭包 ──────────────────────────
  function cleanUrl(u) {
    if (!u || typeof u !== 'string') return null;
    u = u.trim().replace(RE_URL_STRIP_START, '').replace(RE_URL_STRIP_END, '');
    return u || null;
  }

  function normalizeUrl(u) {
    const cleaned = cleanUrl(u);
    if (!cleaned) return null;
    if (cleaned.startsWith('http://') || cleaned.startsWith('https://') || cleaned.startsWith('data:')) return cleaned;
    if (cleaned.startsWith('/')) {
      const base = (config.base || '').trim().replace(/\/+$/, '');
      return base ? (base + cleaned) : cleaned;
    }
    return null;
  }

  // ── PERF 4: VideoProgressUI 用 WeakMap 缓存每张卡片的子节点引用，
  //    避免每次 set/done/fail 都重新 querySelector ──────────────────────────
  const _vpCache = new WeakMap();

  const VideoProgressUI = {
    _refs(card) {
      if (_vpCache.has(card)) return _vpCache.get(card);
      const box = card.querySelector('[data-video-progress]');
      if (!box) return null;
      const refs = {
        box,
        fill: box.querySelector('.progress-fill'),
        pct:  box.querySelector('[data-vpct]'),
        icon: box.querySelector('i')
      };
      _vpCache.set(card, refs);
      return refs;
    },
    show(card) { this._refs(card)?.box.classList.add('show'); },
    hide(card) { this._refs(card)?.box.classList.remove('show'); },
    set(card, percent) {
      const refs = this._refs(card);
      if (!refs) return;
      if (refs.fill) refs.fill.style.width = percent + '%';
      if (refs.pct)  refs.pct.textContent  = percent + '%';
      refs.box.classList.add('show');
    },
    done(card) {
      const refs = this._refs(card);
      if (refs?.icon) refs.icon.className = 'fas fa-check text-green-500';
    },
    fail(card) {
      const refs = this._refs(card);
      if (refs?.icon) refs.icon.className = 'fas fa-triangle-exclamation text-red-500';
    }
  };

  const History = {
    // PERF 2: DocumentFragment 批量插入，减少页面重排次数
    async load() {
      try {
        const items = await db.history.orderBy('timestamp').reverse().toArray();
        if (!items.length) return;

        const frag = document.createDocumentFragment();
        const pending = [];

        for (const item of items) {
          const card = item.isVideo
            ? Atoms.createPlaceholderVideoCard(item.url, item.prompt)
            : Atoms.createPlaceholderCard(item.url, item.prompt);
          card.dataset.isVideo = String(!!item.isVideo);
          card.dataset.prompt  = item.prompt || '';
          frag.appendChild(card);
          pending.push({ card, item });
        }

        // 一次性挂载所有卡片，触发单次重排
        elements.results.appendChild(frag);
        elements.empty.classList.add('hidden');

        // 挂载后再启动各自的懒加载（不阻塞 DOM 插入）
        for (const { card, item } of pending) {
          if (item.isVideo) Atoms.loadVideoPreview(card, item.url);
          else              Atoms.loadImagePreview(card, item.url);
        }
      } catch (_) {}
    },
    async save(url, isVideo, prompt) {
      try {
        const existing = await db.history.where('url').equals(url).first();
        if (existing) return;
        await db.history.add({ url, isVideo, prompt: (prompt || '').substring(0, 200), timestamp: Date.now() });
      } catch (_) {}
    },
    async clear() {

  const Atoms = {
    apiBaseV1() {
      if (!Config.isValid(config)) throw new Error('请先配置 Base URL');
      let base = (config.base || '').trim().replace(/\/+$/, '');
      if (base.endsWith('/v1')) return base;
      return base + '/v1';
    },
    buildUrl(endpoint) { return this.apiBaseV1() + endpoint; },
    buildHeaders(isJson = true) {
      const headers = {};
      if (isJson) headers['Content-Type'] = 'application/json';
      if (config.key && config.key.trim()) headers['Authorization'] = `Bearer ${config.key.trim()}`;
      return headers;
    },
    showError(message) {
      elements.errorText.textContent = message;
      elements.error.classList.remove('hidden');
      setTimeout(() => elements.error.classList.add('hidden'), 5000);
    },

    // PERF 1 + PERF 7: 使用预编译正则 & 提升后的 normalizeUrl/cleanUrl
    extractUrl(content) {
      if (!content) return null;
      if (typeof content !== 'string') {
        try { content = JSON.stringify(content); } catch { return null; }
      }
      const s = content.replace(RE_CODE_BLOCKS, '').trim();
      const mdImg = s.match(RE_MD_IMG);
      if (mdImg) return normalizeUrl(mdImg[1]);
      const mHttp = s.match(RE_HTTP_URL);
      if (mHttp) return normalizeUrl(mHttp[0]);
      const mRel = s.match(RE_REL_IMG);
      if (mRel) return normalizeUrl(mRel[0]);
      return null;
    },

    fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    },
    async apiPostStream(endpoint, payload, onEvent, signal) {
      const isForm = payload instanceof FormData;
      const res = await fetch(this.buildUrl(endpoint), {
        method: 'POST',
        headers: isForm ? this.buildHeaders(false) : this.buildHeaders(true),
        body: isForm ? payload : JSON.stringify(payload),
        signal
      });

      if (!res.ok) {
        let msg = `请求失败: HTTP ${res.status}`;
        try { msg = (await res.json())?.error?.message || msg; } catch (_) {}
        throw new Error(msg);
      }

      const contentType = res.headers.get('Content-Type') || '';
      if (contentType.includes('text/event-stream')) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const data = line.slice(5).trim();
            if (data === '[DONE]') return;
            try { onEvent({ data: JSON.parse(data) }); }
            catch { onEvent({ data }); }
          }
        }
      } else {
        onEvent({ data: await res.json() });
      }
    },
    apiPostFormWithProgress(endpoint, formData, onProgress, signal) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', this.buildUrl(endpoint), true);
        const headers = this.buildHeaders(false);
        for (let [k, v] of Object.entries(headers)) {
          xhr.setRequestHeader(k, v);
        }
        xhr.responseType = 'text';

        if (onProgress) {
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const pct = Math.round((e.loaded / e.total) * 100);
              onProgress(pct);
            }
          };
        }

        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              resolve(JSON.parse(xhr.responseText));
            } catch {
              resolve({ url: xhr.responseText.trim() });
            }
          } else {
            let msg = `请求失败: HTTP ${xhr.status}`;
            try { msg = JSON.parse(xhr.responseText)?.error?.message || msg; } catch (_) {}
            reject(new Error(msg));
          }
        };

        xhr.onerror = () => reject(new Error('网络错误'));
        xhr.onabort = () => reject(Object.assign(new Error('AbortError'), { name: 'AbortError' }));

        if (signal) {
          if (signal.aborted) { xhr.abort(); return; }
          signal.addEventListener('abort', () => xhr.abort(), { once: true });
        }

        xhr.send(formData);
      });
    },

    createPlaceholderCard(url, prompt) {

            <i class="fas fa-download mr-1"></i>下载

          <button type="button" class="copy-prompt-btn block text-center py-2 bg-white/10 hover:bg-white/15 border border-white/15 rounded-xl text-white text-xs w-full">
            <i class="fas fa-copy mr-1"></i>复制提示词

    createPlaceholderVideoCard(url, prompt) {

        <div class="media-wrap video-container relative overflow-hidden">
          <i class="fas fa-spinner spinner text-4xl"></i>

        <div class="overlay">
          <div class="text-xs text-white/85 mb-2 line-clamp-2">${prompt || ''}</div>
          <button type="button" class="single-download block text-center py-2 btn-gradient rounded-xl font-extrabold text-sm w-full mb-2">
            <i class="fas fa-download mr-1"></i>下载
          </button>
          <div class="grid grid-cols-2 gap-2">
            <button type="button" class="copy-url-btn block text-center py-2 bg-white/10 hover:bg-white/15 border border-white/15 rounded-xl text-white text-xs">
              <i class="fas fa-link mr-1"></i>复制链接
            </button>

    async loadImagePreview(card, url) {
      const placeholder = card.querySelector('.image-placeholder');
      if (!placeholder) return;

      if (typeof url === 'string' && url.startsWith('http')) {
        const bytes = await urlBytesLen(url);
        if (bytes > 0 && bytes < MIN_BYTES) { card.remove(); return; }
      }

      const img = document.createElement('img');
      img.src = url;
      img.className = 'w-full h-auto object-cover block';
      img.alt = card.dataset.prompt || 'image';
      img.onload = () => { placeholder.innerHTML = ''; placeholder.appendChild(img); };
      img.onerror = () => { card.remove(); };

    async loadVideoPreview(card, url) {
      const placeholder = card.querySelector('.video-container');
      if (!placeholder) return;
      placeholder.innerHTML = '';

      const video = document.createElement('video');
      video.controls   = false;
      video.muted      = true;
      video.playsInline = true;
      video.loop       = true;
      video.preload    = 'metadata';
      video.className  = 'w-full h-full object-cover';

      const source = document.createElement('source');
      source.src  = url;
      source.type = 'video/mp4';
      video.appendChild(source);

      video.onerror = () => {
        placeholder.innerHTML = `
          <div class="flex flex-col items-center justify-center h-full text-center p-8">

            <p class="text-slate-500 dark:text-gray-400 text-sm">预览不可用</p>
          </div>
        `;
      };

      placeholder.appendChild(video);
      if (videoObserver) videoObserver.observe(video);

  // ── PERF 3: 事件委托 ──────────────────────────────────────────────────────
  // 原来每张卡片挂 6~8 个监听器；现在全部由 #results 容器统一代理，
  // 无论历史记录有多少张卡片，监听器总数固定为 5 个。
  function setupResultsDelegation() {
    const r = elements.results;

    // touch overlay（passive，不阻塞滚动）
    r.addEventListener('touchstart', e => {
      e.target.closest('.card')?.classList.add('touched');
    }, { passive: true });

    r.addEventListener('touchend', e => {
      e.target.closest('.card')?.classList.remove('touched');
    }, { passive: true });

    // mouseleave 不冒泡，改用 mouseout + relatedTarget 判断模拟
    r.addEventListener('mouseout', e => {
      const card = e.target.closest('.card');
      if (card && !card.contains(e.relatedTarget)) card.classList.remove('touched');
    }, { passive: true });

    // 双击进入多选
    r.addEventListener('dblclick', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      e.preventDefault();
      enableMultiSelectMode();
      const cb = card.querySelector('.select-checkbox');
      if (cb) cb.checked = true;
      updateSelectionBar();
    });

    // 所有按钮点击 + 多选模式切换，统一在此处理
    r.addEventListener('click', async e => {
      const card = e.target.closest('.card');
      if (!card) return;

      const dlBtn = e.target.closest('.single-download');
      if (dlBtn) {
        e.preventDefault(); e.stopPropagation();
        await downloadFile(card.dataset.url, card.dataset.prompt, card.dataset.isVideo === 'true');
        return;
      }

      const cpBtn = e.target.closest('.copy-prompt-btn');
      if (cpBtn) {
        e.preventDefault(); e.stopPropagation();
        try {
          await navigator.clipboard.writeText(card.dataset.prompt || '');
          const orig = cpBtn.innerHTML;
          cpBtn.innerHTML = '<i class="fas fa-check mr-1"></i>已复制';
          setTimeout(() => cpBtn.innerHTML = orig, 1600);
        } catch (_) {}
        return;
      }

      const cuBtn = e.target.closest('.copy-url-btn');
      if (cuBtn) {
        e.preventDefault(); e.stopPropagation();
        try {
          await navigator.clipboard.writeText(card.dataset.url || '');
          const orig = cuBtn.innerHTML;
          cuBtn.innerHTML = '<i class="fas fa-check mr-1"></i>已复制';
          setTimeout(() => cuBtn.innerHTML = orig, 1600);
        } catch (_) {}
        return;
      }

      if (multiSelectMode && !e.target.closest('button, a, input')) {
        e.preventDefault();
        toggleCardSelection(card);
      }
    });
  }

  const InputMolecule = {
    init() {
      elements.prompt.addEventListener('input', () => {
        elements.charCount.textContent = elements.prompt.value.length;
      });

      elements.model.addEventListener('change', () => {
        this.updateParams();
        this.updateReferenceLabel();
        this.syncFileInputMultiple();
        this.updateStrengthVisibility();
      });

      elements.inputImage.addEventListener('change', (e) => {
        const files = e.target.files;
        if (!files || files.length === 0) { this.clearImage(); return; }

        state.images = [];
        elements.previewGrid.innerHTML = '';
        elements.previewContainer.classList.add('hidden');

        const isEdit = elements.model.value === 'grok-imagine-1.0-edit';
        const maxImages = isEdit ? 3 : 1;
        const processFiles = Array.from(files).slice(0, maxImages);

        elements.previewContainer.classList.remove('hidden');

        processFiles.forEach((file) => {
          if (!file.type.startsWith('image/')) return Atoms.showError('只能上传图片文件');
          if (file.size > 10 * 1024 * 1024) return Atoms.showError('单张图片不能超过10MB');

          const reader = new FileReader();
          reader.onload = (ev) => {
            const dataUrl = ev.target.result;
            state.images.push({ file, dataUrl });

            const item = document.createElement('div');
            item.className = 'preview-item';
            const img = document.createElement('img');
            img.src = dataUrl;
            img.alt = 'reference';
            item.appendChild(img);
            elements.previewGrid.appendChild(item);

            elements.imageCount.textContent = state.images.length;
            this.updateStrengthVisibility();
          };
          reader.readAsDataURL(file);
        });
      });

      elements.clearImage.addEventListener('click', () => {
        this.clearImage();
        this.updateStrengthVisibility();
      });
    },
    clearImage() {
      state.images = [];
      elements.previewGrid.innerHTML = '';
      elements.previewContainer.classList.add('hidden');
      elements.inputImage.value = '';
      elements.imageCount.textContent = '0';
    },
    updateReferenceLabel() {
      const isEdit = elements.model.value === 'grok-imagine-1.0-edit';
      elements.referenceLabel.textContent = isEdit ? '参考图（必选，最多3张）' : '参考图（可选）';
    },
    syncFileInputMultiple() {
      elements.inputImage.multiple = elements.model.value === 'grok-imagine-1.0-edit';
    },
    updateParams() {
      const isVideo = elements.model.value === 'grok-imagine-1.0-video';
      elements.videoParams.classList.toggle('hidden', !isVideo);
      elements.imageParams.classList.toggle('hidden', isVideo);
      this.updateStrengthVisibility();
    },
    updateStrengthVisibility() {
      const isVideo = elements.model.value === 'grok-imagine-1.0-video';
      const isEdit  = elements.model.value === 'grok-imagine-1.0-edit';
      const show = !isVideo && !isEdit && state.images.length > 0;
      elements.strengthParam.classList.toggle('hidden', !show);
    }
  };

  const GenerationController = {
    running: false,
    abortController: null,
    workerPromises: [],
    // PERF 8: 生成开始时读取一次模型值，循环内不重复访问 DOM
    _currentModel: '',

    setUI(running) {
      this.running = running;
      if (running) {
        elements.generationProgress.classList.add('show');
        elements.generateBtn.innerHTML = '<i class="fas fa-stop mr-2"></i>停止';
        generatedCount = 0;
        elements.generationCounter.textContent = '已生成 0 个';
        generationStartTime = Date.now();
        this.startTimer();
      } else {
        elements.generationProgress.classList.remove('show');
        elements.generateBtn.innerHTML = '<i class="fas fa-magic mr-2"></i>生成';
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      }
    },

    startTimer() {
      timerInterval = setInterval(() => {
        if (!generationStartTime) return;
        const elapsed = Math.floor((Date.now() - generationStartTime) / 1000);
        elements.generationTimer.textContent = `总耗时 ${elapsed}s`;
      }, 250);
    },

    stop() {
      this.running = false;
      if (this.abortController) {
        this.abortController.abort();
        this.abortController = null;
      }
      document.querySelectorAll('.card[data-is-video="true"][data-status="pending"]').forEach(n => n.remove());
      this.workerPromises = [];
      this.setUI(false);
    },

    // PERF 5: 移除恒真的 document.body.contains(card) 检查
    // （card 在 prepend 后必然在 DOM 中，该检查永远为 true）
    onImage(url, prompt) {
      if (!url) return;
      // PERF 8: 使用缓存的模型值，不重复读 DOM
      if (url.startsWith('data:')) {
        const b64 = url.split(',')[1];
        const bytes = base64BytesLen(b64);
        if (this._currentModel !== 'grok-imagine-1.0-fast' && bytes < MIN_BYTES) return;
      }
      const card = Atoms.createPlaceholderCard(url, prompt);
      elements.results.prepend(card);
      Atoms.loadImagePreview(card, url);
      History.save(url, false, prompt).catch(() => {});
      generatedCount++;
      elements.generationCounter.textContent = `已生成 ${generatedCount} 个`;
      elements.empty.classList.add('hidden');
    },

    onVideo(url, prompt, card) {
      if (!url) return;
      card.dataset.url    = url;
      card.dataset.status = 'done';
      Atoms.loadVideoPreview(card, url);
      History.save(url, true, prompt).catch(() => {});
      generatedCount++;
      elements.generationCounter.textContent = `已生成 ${generatedCount} 个`;
      elements.empty.classList.add('hidden');
    },

    async generateOneVideo(signal) {
      const prompt  = elements.prompt.value.trim();
      const seconds = parseInt(elements.videoSeconds.value, 10);
      const quality = elements.videoQuality.value;
      const size    = elements.videoSize.value;

      const card = Atoms.createPlaceholderVideoCard('', prompt);
      elements.results.prepend(card);
      elements.empty.classList.add('hidden');

      let displayed = 0;
      const startTime = Date.now();
      const EST_TOTAL_MS = 8000;

      const uploadHandler = (pct) => {
        const mapped = Math.floor(5 + (pct * 0.10));
        if (mapped > displayed) {
          displayed = mapped;
          VideoProgressUI.set(card, displayed);
        }
      };

      const estimateInterval = setInterval(() => {
        if (!document.body.contains(card) || displayed >= 90) return;
        const elapsed = Date.now() - startTime;
        let target = Math.floor(15 + (elapsed / EST_TOTAL_MS) * 75);
        if (target < displayed) target = displayed;
        if (target > 90) target = 90;
        if (target > displayed) { displayed = target; VideoProgressUI.set(card, displayed); }
      }, 200);

      const form = new FormData();
      form.append('model', 'grok-imagine-1.0-video');
      form.append('prompt', prompt);
      form.append('size', size);
      form.append('seconds', String(seconds));
      form.append('quality', quality);

      if (state.images.length > 0 && state.images[0].file) {
        const f = state.images[0].file;
        form.append('input_reference', f, f.name || 'reference.png');
      }

      try {
        const result = await Atoms.apiPostFormWithProgress('/videos', form, uploadHandler, signal);
        clearInterval(estimateInterval);

        let url = result?.url
          || result?.data?.url
          || (Array.isArray(result?.data) ? result.data[0]?.url : null)
          || result?.video_url
          || result?.data?.video_url;

        if (!url) throw new Error('未获取到视频链接');

        VideoProgressUI.set(card, 100);
        VideoProgressUI.done(card);
        this.onVideo(url, prompt, card);
      } catch (err) {
        clearInterval(estimateInterval);
        VideoProgressUI.fail(card);
        if (err && err.name === 'AbortError') {
          if (card.dataset.status !== 'done') card.remove();
        } else {
          Atoms.showError(err.message || '视频生成失败');
        }
        throw err;
      }
    },

    async start() {
      if (this.running) { this.stop(); return; }

      const prompt = elements.prompt.value.trim();
      if (!prompt) return Atoms.showError('请填写提示词');
      if (prompt.length < 2) return Atoms.showError('提示词太短');
      if (prompt.length > MAX_PROMPT_LENGTH) return Atoms.showError(`提示词最多 ${MAX_PROMPT_LENGTH} 字符`);
      if (!Config.isValid(config)) { showConfigModal(); return Atoms.showError('请先配置 Base URL'); }

      // PERF 8: 生成开始时读取并缓存模型值
      this._currentModel = elements.model.value;
      const isVideo  = this._currentModel === 'grok-imagine-1.0-video';
      const isEdit   = this._currentModel === 'grok-imagine-1.0-edit';
      const isFast   = this._currentModel === 'grok-imagine-1.0-fast';
      const imageModel = isFast ? 'grok-imagine-1.0-fast' : 'grok-imagine-1.0';

      if (isEdit && state.images.length === 0) return Atoms.showError('图像编辑必须上传参考图');

      this.abortController = new AbortController();
      this.setUI(true);
      elements.generationProgressText.textContent = isVideo ? '视频生成中...' : '图像生成中...';

      const handleChatLikeStream = (evt) => {
        const data = evt.data;
        if (data && Array.isArray(data.data)) {
          data.data.forEach(item => {
            if (item.url) this.onImage(item.url, prompt);
            else if (item.b64_json) this.onImage(`data:image/png;base64,${item.b64_json}`, prompt);
          });
          return;
        }
        if (data?.url) return this.onImage(data.url, prompt);
        if (data?.b64_json) return this.onImage(`data:image/png;base64,${data.b64_json}`, prompt);

        const choices = data?.choices || [];
        for (const c of choices) {
          const v = (c.delta && c.delta.content !== undefined) ? c.delta.content : c.message?.content;
          if (!v) continue;
          if (typeof v === 'string') {
            const u = Atoms.extractUrl(v);
            if (u) this.onImage(u, prompt);
          } else if (Array.isArray(v)) {
            for (const seg of v) {
              const t = seg?.text || seg?.content || '';
              const u = Atoms.extractUrl(t);
              if (u) this.onImage(u, prompt);
            }
          } else if (typeof v === 'object') {
            const u = Atoms.extractUrl(v);
            if (u) this.onImage(u, prompt);
          }
        }
      };

      // PERF 8: imageModel / isEdit / isFast 均来自生成开始时的缓存，不再每批读 DOM
      const generateOneImageBatch = async (signal) => {
        const hasFiles        = state.images.length > 0;
        const files           = hasFiles ? state.images.map(x => x.file) : [];
        const size            = elements.imageSize.value;
        const response_format = elements.responseFormat.value;
        const strength        = elements.strength?.value;

        if (hasFiles) {
          if (isEdit) {
            const form = new FormData();
            form.append('model', 'grok-imagine-1.0-edit');
            form.append('prompt', prompt);
            form.append('n', String(FIXED_IMAGE_N));
            form.append('stream', 'true');
            form.append('size', size);
            form.append('response_format', response_format);
            files.forEach((f, idx) => form.append('image', f, f.name || `reference_${idx}.png`));

            await Atoms.apiPostStream('/images/edits', form, (evt) => {
              const data = evt.data;
              if (data && Array.isArray(data.data)) {
                data.data.forEach(item => {
                  if (item.url) this.onImage(item.url, prompt);
                  else if (item.b64_json) this.onImage(`data:image/png;base64,${item.b64_json}`, prompt);
                });
              } else if (data?.url) this.onImage(data.url, prompt);
              else if (data?.b64_json) this.onImage(`data:image/png;base64,${data.b64_json}`, prompt);
            }, signal);
          } else {
            const dataUrl = await Atoms.fileToDataUrl(files[0]);
            const body = {
              model: imageModel,
              messages: [{
                role: 'user',
                content: [
                  { type: 'text', text: prompt },
                  { type: 'image_url', image_url: { url: dataUrl } }
                ]
              }],
              stream: true,
              image_config: { n: FIXED_IMAGE_N, size, response_format, strength: strength || '0.75' }
            };
            await Atoms.apiPostStream('/chat/completions', body, (evt) => handleChatLikeStream(evt), signal);
          }
        } else {
          if (isFast) {
            const body = {
              model: imageModel,
              messages: [{ role: 'user', content: [{ type: 'text', text: prompt }] }],
              stream: true,
              image_config: { n: FIXED_IMAGE_N, size, response_format }
            };
            await Atoms.apiPostStream('/chat/completions', body, (evt) => handleChatLikeStream(evt), signal);
          } else {
            const body = {
              model: imageModel,
              prompt,
              n: FIXED_IMAGE_N,
              stream: true,
              size,
              response_format
            };
            await Atoms.apiPostStream('/images/generations', body, (evt) => {
              const data = evt.data;
              if (data && Array.isArray(data.data)) {
                data.data.forEach(item => {
                  if (item.url) this.onImage(item.url, prompt);
                  else if (item.b64_json) this.onImage(`data:image/png;base64,${item.b64_json}`, prompt);
                });
              } else if (data?.url) this.onImage(data.url, prompt);
              else if (data?.b64_json) this.onImage(`data:image/png;base64,${data.b64_json}`, prompt);
            }, signal);
          }
        }
      };

      try {
        if (isVideo) {
          this.workerPromises = Array.from({ length: MAX_CONCURRENCY }).map(async () => {
            while (this.running) {
              try { await this.generateOneVideo(this.abortController.signal); }
              catch (e) { if (e.name === 'AbortError') break; await new Promise(r => setTimeout(r, 900)); }
              await new Promise(r => setTimeout(r, 150));
            }
          });
          await Promise.all(this.workerPromises);
        } else {
          this.workerPromises = Array.from({ length: MAX_CONCURRENCY }).map(async () => {
            while (this.running) {
              try { await generateOneImageBatch(this.abortController.signal); }
              catch (e) { if (e.name === 'AbortError') break; await new Promise(r => setTimeout(r, 900)); }
              await new Promise(r => setTimeout(r, 150));
            }
          });
          await Promise.all(this.workerPromises);
        }
      } catch (e) {
        if (e.name !== 'AbortError') Atoms.showError(e.message || '生成失败');
      } finally {
        this.setUI(false);
      }
    }
  };

  function showConfigModal() {
    elements.configBase.value       = config.base;
    elements.configKey.value        = config.key;
    elements.configHistoryKey.value = config.historyKey;
    elements.configModal.classList.remove('hidden');
  }
  function hideConfigModal() { elements.configModal.classList.add('hidden'); }

  elements.openConfig.addEventListener('click', showConfigModal);
  elements.saveConfig.addEventListener('click', () => {
    const newConfig = {
      base: elements.configBase.value.trim(),
      key: elements.configKey.value.trim(),
      historyKey: elements.configHistoryKey.value.trim() || 'grok_imagine_history'
    };
    if (!newConfig.base) return Atoms.showError('请填写 Base URL');
    config = newConfig;
    Config.save(config);
    hideConfigModal();
  });
  elements.closeConfig.addEventListener('click', hideConfigModal);
  elements.cancelConfig.addEventListener('click', hideConfigModal);
  elements.configModal.addEventListener('click', (e) => { if (e.target === elements.configModal) hideConfigModal(); });

  document.addEventListener('DOMContentLoaded', async () => {
    videoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if (entry.isIntersecting) video.play().catch(() => {});
        else video.pause();
      });
    }, { threshold: 0.5 });

    Theme.init();
    elements.themeToggle.addEventListener('click', () => Theme.cycle());

    if (!Config.isValid(config)) showConfigModal();

    // PERF 3: 注册结果容器级事件委托（替代每张卡片的独立监听器）
    setupResultsDelegation();

    await History.load();
    InputMolecule.init();
    elements.charCount.textContent = elements.prompt.value.length;
    InputMolecule.updateParams();
    InputMolecule.updateReferenceLabel();
    InputMolecule.syncFileInputMultiple();
    InputMolecule.updateStrengthVisibility();

    elements.generateBtn.addEventListener('click', () => GenerationController.start());
    elements.stopGenerate.addEventListener('click', () => GenerationController.stop());

    elements.clearHistory.addEventListener('click', async () => {
      if (confirm('确定要清除所有历史记录吗？')) await History.clear();
    });

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') GenerationController.start();
      if (e.key === 'Escape' && GenerationController.running) GenerationController.stop();
    });
  });
  </script>
</body>
</html>
